<div class="auth-container">
  <form class="auth-card" (ngSubmit)="onSubmit()">
    <h2>Create Account</h2>
    <p class="subtitle">Start tracking your money smartly</p>

    <label>Username</label>
    <input type="text" [(ngModel)]="username" name="username" required />

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" required />

    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password" required minlength="6" />

    <p class="error" *ngIf="error">{{ error }}</p>

    <button type="submit">Sign Up</button>
    <p class="switch">Already have an account? <a routerLink="/login">Login</a></p>
  </form>
</div>
