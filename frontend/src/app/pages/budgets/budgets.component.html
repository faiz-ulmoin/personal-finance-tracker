<app-navbar></app-navbar>
<div class="page">
  <h1>Budgets</h1>
  <div class="month-nav">
    <button (click)="changeMonth(-1)" aria-label="Previous month">←</button>
    <span class="month">{{ monthLabel }}</span>
    <button (click)="changeMonth(1)" aria-label="Next month">→</button>
    <button class="today" *ngIf="!isCurrentMonth" (click)="goToToday()">Today</button>
  </div>

  <form class="budget-form" (ngSubmit)="onSubmit()">
    <select [(ngModel)]="form.category" name="category" required>
      <option value="" disabled selected>Category</option>
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
    <input type="number" [(ngModel)]="form.monthlyLimit" name="monthlyLimit" placeholder="Monthly Limit ₹" required min="1" />
    <button type="submit">Set Budget</button>
  </form>

  <div class="budget-list">
    <div class="budget-card" *ngFor="let b of budgets" [class.over]="isOverBudget(b)">
      <div class="budget-head">
        <strong>{{ b.category }}</strong>
        <button (click)="delete(b.id!)">✕</button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="percentUsed(b)"></div>
      </div>
      <p>₹{{ b.spent || 0 | number:'1.2-2' }} of ₹{{ b.monthlyLimit | number:'1.2-2' }}</p>
      <p class="alert" *ngIf="isOverBudget(b)">⚠️ Over budget!</p>
    </div>
  </div>
</div>
