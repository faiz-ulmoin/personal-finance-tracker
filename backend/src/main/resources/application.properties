spring.application.name=finance-tracker

# MySQL Database — uses env vars in production, falls back to local defaults
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finance_tracker?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Faiz@333}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:change_this_to_a_long_random_secret_key_min_32_chars}
jwt.expiration=86400000

server.port=${PORT:8080}
